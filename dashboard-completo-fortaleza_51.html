<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Fortaleza — Capital Upgrade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
:root{
  --bg:#1a1a1a;--surface:#262626;--surface-alt:#2a2a2a;--border:#3a3a3a;
  --text:#f0f0f0;--text-sec:#a0a0a0;--text-dim:#666;
  --accent:#22c55e;--accent-bg:rgba(34,197,94,.08);
  --card-bg:#262626;--card-border:#3a3a3a;
  --table-hover:rgba(255,255,255,.03);--table-header:#2e2e2e;
  --cr-blue:#60a5fa;
}
[data-theme="light"]{
  --bg:#e4e7ec;--surface:#f5f6f8;--surface-alt:#eef0f3;--border:#d4d7dd;
  --text:#1a1a1a;--text-sec:#4a4a4a;--text-dim:#888;
  --accent:#059669;--accent-bg:rgba(5,150,105,.06);
  --card-bg:#fff;--card-border:#d4d7dd;
  --table-hover:rgba(0,0,0,.02);--table-header:#f4f6f8;
  --cr-blue:#1d4ed8;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
#app{display:flex;flex-direction:column;min-height:100vh}

header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.1);padding:9px 28px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;border-radius:9px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.logo-text .t1{font-size:14px;font-weight:800}
.logo-text .t2{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
#ts{font-size:11px;color:var(--text-sec)}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(34,197,94,.08)}
.hdr-right{display:flex;align-items:center;gap:8px}
.periodo-nav{display:flex;align-items:center;gap:6px;background:var(--table-header);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:4px 6px;margin-right:8px}
.periodo-btn{background:transparent;border:none;color:var(--accent);font-size:13px;font-weight:800;cursor:pointer;padding:2px 6px;border-radius:4px;transition:background .12s}
.periodo-btn:hover{background:rgba(34,197,94,.15)}
.periodo-btn:disabled{color:var(--text-dim);cursor:not-allowed}
.periodo-label{font-size:12px;font-weight:700;color:var(--text);min-width:110px;text-align:center;text-transform:capitalize}

.main-tabs{display:flex;gap:2px;padding:10px 28px 0;border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:99;background:var(--bg)}
.main-tab{padding:6px 20px;border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;color:var(--text-sec);background:transparent;transition:all .12s}
.main-tab.on{background:var(--surface-alt);color:var(--text);border-color:var(--border);border-bottom-color:var(--bg);margin-bottom:-1px}
.main-panel{display:none;flex:1;flex-direction:column}
.main-panel.on{display:flex}

/* ===== PLACAR ===== */
.placar-main{padding:20px 28px;display:flex;flex-direction:column;gap:20px}
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:2px}
.podio-toggle-btn{background:linear-gradient(135deg,#facc15,#f59e0b);color:#1a1400;border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;box-shadow:0 2px 8px rgba(245,158,11,.3);transition:transform .12s}
.podio-toggle-btn:hover{transform:translateY(-1px)}
.podios-grande-grid{grid-template-columns:1fr 1fr;gap:24px;margin-top:14px}
.pod-grande{padding:28px 24px 0}
.pod-grande .pod-title{font-size:14px;margin-bottom:22px}
.pod-grande .ps.f .av{width:110px;height:110px;font-size:34px}
.pod-grande .ps.s .av{width:86px;height:86px;font-size:24px}
.pod-grande .ps.t .av{width:74px;height:74px;font-size:20px}
.pod-grande .ps.f .pn{font-size:17px}
.pod-grande .pn{font-size:15px}
.pod-grande .ps.f .pv{font-size:19px}
.pod-grande .pv{font-size:16px}
.pod-grande .pct-lbl{font-size:14px}
.pod-grande .ps.f .pb{height:70px;font-size:26px}
.pod-grande .ps.s .pb{height:50px;font-size:18px}
.pod-grande .ps.t .pb{height:36px;font-size:16px}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);white-space:nowrap}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,#1e3a28,transparent)}
.kpi-hero{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card-realizado{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:14px;padding:20px;display:flex;flex-direction:column;min-height:150px}
.card-kpi{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--border);border-radius:14px;padding:20px;display:flex;flex-direction:column;min-height:150px}
.card-kpi.pace{border-top-color:#0ea5e9}.card-kpi.gap{border-top-color:#64748b}.card-kpi.meta{border-top-color:#0ea5e9}
.kpi-sec{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.card-sec{background:var(--surface);border:1px solid var(--border);border-top:2px solid #1e3a28;border-radius:12px;padding:18px}
.card-sec.proposta{border-top-color:#f59e0b}.card-sec.tkm{border-top-color:#0ea5e9}.card-sec.cancel{border-top-color:#64748b}
.klbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;min-height:14px}
.kval{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1;margin-bottom:auto}
.kval.hero-val{color:var(--accent)}.kval.meta-val{color:#0ea5e9}
.ksub{font-size:11px;color:var(--text-sec);margin-top:auto;padding-top:8px}
.prog-wrap{margin-top:auto;padding-top:12px}
.prog-info{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
.pi-label{color:var(--text-sec)}.pi-val{font-weight:700;font-size:13px}
.pi-val.g{color:var(--accent)}.pi-val.t{color:#22d3ee}.pi-val.a{color:#f59e0b}.pi-val.s{color:var(--text-sec)}
.pbar{height:5px;border-radius:3px;background:var(--surface);overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .8s}
.pfill.g{background:linear-gradient(90deg,#16a34a,#4ade80)}.pfill.t{background:linear-gradient(90deg,#0e7490,#22d3ee)}

.funnel-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.stage{background:var(--surface);border:1px solid var(--border);min-height:160px;display:flex;flex-direction:column;border-radius:14px;padding:20px 18px;position:relative;overflow:hidden;transition:border-color .3s}
.stage::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#4ade80,transparent)}
.stage .label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-sec);margin-bottom:8px;font-weight:700}
.stage .value{font-size:32px;font-weight:800;color:var(--text);line-height:1}
.stage .conv{margin-top:6px;font-size:11px;color:var(--text-dim)}
.stage-bar-wrap{margin-top:auto;padding-top:10px}
.stage-bar-track{position:relative;height:8px;background:var(--border);border-radius:4px;overflow:visible}
.stage-bar-legend{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--text-dim)}
.stage-bar-legend b{color:var(--text-sec);font-weight:600}
.stage-bar-legend .sbl-dim{color:var(--text-dim)}
.stage-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.stage-bar-marker{position:absolute;top:-4px;width:3px;height:20px;border-radius:2px;background:var(--text);box-shadow:0 0 6px rgba(0,0,0,.2)}
.stage-bar-legend{display:flex;justify-content:space-between;margin-top:8px;font-size:9px;font-weight:700;letter-spacing:.3px}
.sbl-real{color:var(--accent)}
.sbl-proj{color:#facc15}
.sbl-plan{color:var(--text-dim)}
.stage.pace-ok{border-color:rgba(34,197,94,.5);box-shadow:0 0 0 1px rgba(34,197,94,.12) inset}
.stage.pace-behind{border-color:rgba(245,158,11,.5);box-shadow:0 0 0 1px rgba(245,158,11,.12) inset}
.stage-pace-hover{font-size:10px;color:var(--text-dim);margin-top:10px;padding-top:8px;border-top:1px solid var(--border);cursor:help}
.canal-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.canal-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-sec);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.canal-btn:hover{border-color:rgba(74,222,128,.4);color:var(--text)}
.canal-btn.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.perf-table .perf-cell{text-align:center;font-weight:500;cursor:pointer;transition:background .1s}
.perf-table .perf-cell:hover{background:var(--table-hover)}
.perf-detail-box{background:var(--surface-alt);padding:12px 16px;border-top:1px solid var(--border)}
.lig-table .lig-group-header{border-left:2px solid var(--accent);padding-left:10px;text-align:center}
.lig-table .lig-sep{border-left:2px solid var(--border)}
.top-badge-g{background:rgba(255,215,64,.15);color:#ffd740}
.top-badge-s{background:rgba(176,190,197,.12);color:#c0cdd4}
.top-badge-b{background:rgba(205,127,50,.12);color:#cd9f72}
.podio-btns{display:flex;gap:8px;margin-bottom:16px}
.podio-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-sec);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.podio-btn:hover{border-color:var(--accent);color:var(--text)}
.podio-btn.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

/* ===== CANAIS ===== */
.canal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px}
.canal-header{padding:12px 18px;font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.canal-header.trafego{color:#22d3ee;background:rgba(34,211,238,.08)}
.canal-header.base{color:#f59e0b;background:rgba(245,158,11,.08)}
.canal-header.indicacao{color:#a78bfa;background:rgba(167,139,250,.08)}
.canal-header.consolidado{color:var(--accent);background:rgba(74,222,128,.1)}
.canal-card.consolidado{border-color:#2d5c38}
.canal-table{width:100%;border-collapse:collapse}
.canal-table th{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);text-align:center;padding:8px 14px;font-weight:700;border-bottom:1px solid var(--border)}
.canal-table th:first-child{text-align:left}
.canal-table td{padding:9px 14px;text-align:right;font-size:12px;color:var(--text);border-bottom:1px solid var(--border)}
.canal-table td:first-child{text-align:left;font-weight:700;color:var(--text)}
.canal-table tr:last-child td{border-bottom:none}
.canal-table .safra-col{color:var(--text);font-weight:600}
.canal-table .mesant-col{color:var(--text);font-weight:600}
.canal-table .total-col{color:var(--text);font-weight:700}
.canal-table tr.cr-row td{font-style:italic;color:var(--text-dim);font-size:11px;background:var(--table-hover)}
.canal-table tr.cr-row td:first-child{padding-left:26px}
.canal-table tr.cr-row .cr-value{font-style:normal;font-weight:800;color:var(--text)}
.canal-table tr.cr-row .cr-meta{font-style:normal;font-weight:700;color:#0ea5e9}
.canal-table tr.hit-row td{border-top:1px solid #1e3a28}
.canal-table tr.hit-row .cr-value{color:var(--text)}

/* ===== GRAFICOS (barras + pizza, CSS puro) ===== */
.graficos-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-top:24px}
.grafico-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;display:flex;flex-direction:column;height:100%}
.grafico-titulo{font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text);margin-bottom:20px}
.barra-grupo{margin-bottom:20px}
.barra-grupo-label{font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px}
.barra-linha{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.barra-nome{width:100px;font-size:12px;font-weight:600;color:var(--text-sec);flex-shrink:0}
.barra-track{flex:1;height:22px;background:var(--surface-alt);border-radius:6px;overflow:hidden}
.barra-fill{height:100%;border-radius:6px;min-width:2px}
.barra-fill.trafego{background:linear-gradient(90deg,#0e7490,#22d3ee)}
.barra-fill.base{background:linear-gradient(90deg,#b45309,#f59e0b)}
.barra-fill.indicacao{background:linear-gradient(90deg,#6d28d9,#a78bfa)}
.barra-valor-fora{width:48px;text-align:right;font-size:14px;font-weight:800;color:var(--text);flex-shrink:0}

.pizza-wrap{display:flex;align-items:center;gap:32px;justify-content:center;padding:10px 0;flex:1}
.pizza-svg{flex-shrink:0}
.pizza-legenda{display:flex;flex-direction:column;gap:12px}
.pizza-legenda-item{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:var(--text)}
.pizza-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.pizza-dot.trafego{background:#22d3ee}
.pizza-dot.base{background:#f59e0b}
.pizza-dot.indicacao{background:#a78bfa}
.pizza-pct{font-weight:900;margin-left:6px;font-size:16px}

/* ===== TABELAS PESSOA x CANAL ===== */
.pc-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.pc-table th{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);text-align:right;padding:8px 12px;font-weight:700;border-bottom:1px solid var(--border)}
.pc-table th:first-child{text-align:left}
.pc-table td{padding:8px 12px;text-align:right;font-size:12px;color:var(--text);border-bottom:1px solid var(--border)}
.pc-table td:first-child{text-align:left;font-weight:700;color:var(--text)}
.pc-table .pc-total{font-weight:800;color:var(--accent)}
.pc-avatar{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--table-hover);color:var(--text-sec);font-size:9px;font-weight:700;margin-right:8px;vertical-align:middle;overflow:hidden}
.pc-sub{font-size:9px;color:var(--text-dim);font-weight:500;margin-top:2px}
.sdr-cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-bottom:16px}

/* ===== SEMANAS (cards estilo Resultado por Semana) ===== */
.semanas-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.semana-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.semana-card.w1{border-top:3px solid #22d3ee}
.semana-card.w2{border-top:3px solid #4ade80}
.semana-card.w3{border-top:3px solid #f59e0b}
.semana-card.w4{border-top:3px solid #64748b}
.semana-head{display:flex;align-items:center;justify-content:center;padding:22px 24px 16px}
.semana-titulo{font-size:14px;font-weight:800;letter-spacing:1.2px;color:var(--text)}
.semana-pct{font-size:36px;font-weight:900;color:var(--text)}
.semana-money{display:grid;grid-template-columns:repeat(3,1fr);background:var(--surface-alt);margin:0 18px;border-radius:8px;padding:16px 12px;gap:6px}
.semana-money div{text-align:center}
.semana-money .sm-lbl{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--text-dim);margin-bottom:5px}
.semana-money .sm-val{font-size:18px;font-weight:800;color:var(--text);line-height:1.3}
.semana-lista{padding:20px 24px 26px;display:flex;flex-direction:column;gap:16px}
.semana-item{display:grid;grid-template-columns:66px auto 1fr;align-items:center;gap:12px}
.semana-item .si-label{font-size:15px;font-weight:700;color:var(--text)}
.semana-item .si-val{font-size:15px;color:var(--text);text-align:left;white-space:nowrap}
.semana-item .si-num{font-weight:700;color:var(--text)}
.semana-item .si-frac{font-weight:400;color:var(--text-dim);font-size:13px}
.semana-item .si-pct{font-weight:600;color:var(--accent);font-size:12px;margin-left:6px}
.semana-item .si-val.warn{color:#f87171}
.si-bar-track{height:7px;border-radius:4px;background:var(--border);overflow:hidden}
.si-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#16a34a,#4ade80)}

/* ===== RANKING (Closer/SDR) ===== */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;padding:14px 28px 0}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,rgba(34,197,94,.8),rgba(34,197,94,.2))}
.kpi-l{font-size:10px;color:var(--text-sec);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:700}
.kpi-v{font-size:22px;font-weight:800;line-height:1;color:var(--text)}
.kpi-v.money{color:var(--accent);font-size:22px}

.rank-body{padding:0 28px 20px;flex:1;display:flex;flex-direction:column}
.subtabs{display:flex;gap:4px;margin-bottom:10px}
.subtab{padding:4px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;color:var(--text-dim);background:transparent;border:1px solid var(--border);transition:all .12s}
.subtab.on{background:rgba(34,197,94,.15);color:var(--accent);border-color:rgba(34,197,94,.35)}
.subpanel{display:none;flex:1;flex-direction:column}
.subpanel.on{display:flex}

.sec{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-sec);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:8px}
.main-layout{display:grid;grid-template-columns:420px 1fr;gap:14px;flex:1}
.left-col{display:flex;flex-direction:column;gap:8px}

.pod-card{flex-shrink:0;background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:14px 16px 0}
.pod-title{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);text-align:center;margin-bottom:12px;font-weight:700}
.podium{display:flex;align-items:flex-end;justify-content:center}
.ps{display:flex;flex-direction:column;align-items:center;flex:1}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;border:3px solid transparent;overflow:hidden}
.ps.f .av{width:78px;height:78px;font-size:24px;border-color:#ffd740;background:rgba(255,215,64,.12);color:#ffd740}
.ps.s .av{width:60px;height:60px;font-size:17px;border-color:#c0cdd4;background:rgba(176,190,197,.1);color:#c0cdd4}
.ps.t .av{width:52px;height:52px;font-size:14px;border-color:#cd7f32;background:rgba(205,127,50,.1);color:#cd7f32}
.pn{font-size:12px;font-weight:700;text-align:center;margin-top:5px;color:var(--text)}
.ps.f .pn{font-size:13px}
.pv{font-size:12px;font-weight:700;margin-top:1px;color:var(--accent)}
.ps.f .pv{font-size:14px}
.pct-lbl{font-size:11px;font-weight:700;color:var(--text-sec)}
.ps.f .pct-lbl{color:var(--accent)}
.pb{width:100%;border-radius:5px 5px 0 0;display:flex;align-items:center;justify-content:center;font-weight:800;margin-top:8px}
.ps.f .pb{height:48px;font-size:18px;color:#ffd740;background:rgba(255,215,64,.12);border-top:1px solid rgba(255,215,64,.35)}
.ps.s .pb{height:34px;font-size:13px;color:#c0cdd4;background:rgba(176,190,197,.1);border-top:1px solid rgba(176,190,197,.25)}

const BASE_URL = 'https://script.google.com/macros/s/AKfycbxA4LAr8zI92Rnx1QXDEFfLC44uqC93Ska1lT_fvr99e-Zttcz4FPq4EWZZbloqSg/exec';

const MES_MINIMO = { ano: 2026, mes: 6 }; // Junho/2026 — nao navega antes disso
const NOMES_MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const hojeInicial = new Date();
let periodoAtual = { ano: hojeInicial.getFullYear(), mes: hojeInicial.getMonth() + 1 };

function periodoQuery_(){
  return '&ano=' + periodoAtual.ano + '&mes=' + periodoAtual.mes;
}

function atualizarLabelPeriodo(){
  document.getElementById('periodoLabel').textContent = NOMES_MESES[periodoAtual.mes - 1] + '/' + periodoAtual.ano;
  const ehMinimo = (periodoAtual.ano === MES_MINIMO.ano && periodoAtual.mes === MES_MINIMO.mes);
  document.querySelector('.periodo-btn[onclick="mudarPeriodo(-1)"]').disabled = ehMinimo;
}

function mudarPeriodo(delta){
  let novoMes = periodoAtual.mes + delta;
  let novoAno = periodoAtual.ano;
  if(novoMes < 1){ novoMes = 12; novoAno -= 1; }
  if(novoMes > 12){ novoMes = 1; novoAno += 1; }
  if(novoAno < MES_MINIMO.ano || (novoAno === MES_MINIMO.ano && novoMes < MES_MINIMO.mes)) return;
  periodoAtual = { ano: novoAno, mes: novoMes };
  atualizarLabelPeriodo();
  loadAll(false);
}

function initTooltips_(){
  const box = document.createElement('div');
  box.id = 'tooltipBox';
  box.className = 'tooltip-box';
  document.body.appendChild(box);

  document.addEventListener('mouseover', function(e){
    const el = e.target.closest('.tt');
    if(!el) return;
    box.innerHTML = el.getAttribute('data-tt') || '';
    box.style.display = 'block';
  });
  document.addEventListener('mousemove', function(e){
    if(box.style.display === 'block'){
      const maxLeft = window.innerWidth - 300;
      const left = Math.min(e.pageX + 14, maxLeft);
      box.style.left = left + 'px';
      box.style.top = (e.pageY + 16) + 'px';
    }
  });
  document.addEventListener('mouseout', function(e){
    const el = e.target.closest('.tt');
    if(!el) return;
    box.style.display = 'none';
  });
}

function tt_(label, explicacao){
  return '<span class="tt" data-tt="'+explicacao.replace(/"/g,'&quot;')+'">'+label+'</span>';
}

function ini(nome){ return (nome||'?').split(' ').map(function(p){return p[0];}).slice(0,2).join('').toUpperCase(); }

function normalizarNome_(s){
  return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}

const FOTOS_NORM_ = {};
Object.keys(FOTOS_POR_NOME).forEach(function(k){ FOTOS_NORM_[normalizarNome_(k)] = FOTOS_POR_NOME[k]; });

function fotoUrl_(nomeCompleto){
  const partes = (nomeCompleto||'').split(' ').filter(Boolean);
  const candidatos = [];
  if(partes.length>=3) candidatos.push(partes.slice(0,3).join(' '));
  if(partes.length>=2) candidatos.push(partes.slice(0,2).join(' '));
  if(partes.length>=1) candidatos.push(partes[0]);
  for(let i=0;i<candidatos.length;i++){
    const id = FOTOS_NORM_[normalizarNome_(candidatos[i])];
    if(id) return 'https://drive.google.com/thumbnail?id='+id+'&sz=w200-h200';
  }
  return null;
}

// Retorna o conteudo interno de um avatar: <img> se tiver foto, ou as iniciais como texto
function avatarConteudo_(nome){
  const url = fotoUrl_(nome);
  if(url){
    return '<img src="'+url+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.outerHTML=\''+ini(nome)+'\'">';
  }
  return ini(nome);
}
function NUM(v){ return new Intl.NumberFormat('pt-BR').format(Math.round(v||0)); }
function brl(v){ return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}); }

// ===== CONTADORES ANIMADOS (0 até o valor final) =====
function cu_(valor, formato){
  return '<span class="cu" data-val="'+(Number(valor)||0)+'" data-fmt="'+formato+'">0</span>';
}

function animarValor_(el, valorFinal, formato){
  const duracao = 700;
  const inicio = performance.now();
  const formatar = formato==='money' ? brl : NUM;
  function passo(agora){
    const t = Math.min((agora-inicio)/duracao, 1);
    const eased = 1 - Math.pow(1-t, 3);
    el.textContent = formatar(valorFinal * eased);
    if(t<1) requestAnimationFrame(passo);
    else el.textContent = formatar(valorFinal);
  }
  requestAnimationFrame(passo);
}

function animarContadores_(){
  document.querySelectorAll('.cu').forEach(function(el){
    const valor = parseFloat(el.getAttribute('data-val'));
    const formato = el.getAttribute('data-fmt');
    el.classList.remove('cu');
    animarValor_(el, valor, formato);
  });
}
function PCT(v){ if(v===null||v===undefined||isNaN(v)) return '—'; return Math.round(v*100)+'%'; }
function numG(v){ const n = parseFloat(String(v).replace(/[^\d.,-]/g,'').replace(',','.')); return isNaN(n) ? 0 : n; }

function pCls(p){ return p>=100?'g':p>=70?'t':p>=40?'a':'s'; }

function renderSemanas(linhas){
  if(!linhas || linhas.length===0) return '';

  const classesTopo = ['w1','w2','w3','w4'];

  const cards = linhas.map(function(s, i){
    const plan = s.planVendaValor || 0;
    const proj = s.projVendaValor || 0;
    const real = s.vendaValorRealizado || 0;
    const pct = plan>0 ? Math.round((real/plan)*100) : 0;

    function item(label, real, meta, isMoney){
      const fmt = isMoney ? brl : NUM;
      const pctItem = meta>0 ? Math.round((real/meta)*100) : (real>0?100:0);
      const pctLabel = meta>0 ? ' <span class="si-pct">'+pctItem+'% da meta</span>' : '';
      return '<div class="semana-item">' +
        '<div class="si-label">'+label+'</div>' +
        '<div class="si-val"><span class="si-num">'+fmt(real)+'</span><span class="si-frac"> / '+fmt(meta)+'</span>'+pctLabel+'</div>' +
        '<div class="si-bar-track"><div class="si-bar-fill" style="width:'+Math.min(pctItem,100)+'%"></div></div>' +
      '</div>';
    }

    return '<div class="semana-card '+classesTopo[i % 4]+'">' +
      '<div class="semana-head"><span class="semana-titulo">'+s.semana.toUpperCase()+'</span></div>' +
      '<div style="text-align:center;font-size:11px;color:var(--text-dim);margin:-8px 0 10px">'+(s.periodoLabel ? 'De '+s.periodoLabel : '')+'</div>' +
      '<div class="semana-money">' +
        '<div><div class="sm-lbl">'+tt_('PLAN.','Meta de venda planejada pra essa semana.')+'</div><div class="sm-val">'+brl(plan)+'</div></div>' +
        '<div><div class="sm-lbl">'+tt_('PROJ.','Projeção de venda pra essa semana.')+'</div><div class="sm-val">'+brl(proj)+'</div></div>' +
        '<div><div class="sm-lbl">'+tt_('REAL.','Vendido de verdade nessa semana.')+'</div><div class="sm-val">'+brl(real)+'</div></div>' +
      '</div>' +
      '<div class="semana-lista">' +
        item('Vendas', real, plan, true) +
        item('Leads', s.leadsRealizado, s.metaLead, false) +
        item('Agend.', s.agendamentoRealizado, s.metaAgendamento, false) +
        item('Shows', s.showRealizado, s.metaShow, false) +
        '<div class="semana-item"><div class="si-label">TKM</div><div class="si-val"><span class="si-num">'+(s.tkmSemana>0?brl(s.tkmSemana):'—')+'</span></div><div></div></div>' +
      '</div>' +
    '</div>';
  }).join('');

  return '<div class="sec-hdr"><span class="sec-lbl">'+tt_('Resultado por Semana','Divide o mês em 4 blocos (domingo-sábado). Se sobrar um 5º, funde com o vizinho: se a última semana já tem 5 dias úteis, junta as 2 primeiras; senão, junta as 2 últimas.')+'</span><div class="sec-line"></div></div>' +
    '<div class="semanas-grid">'+cards+'</div>';
}

function stageBarHtml_(realizado, planejado, projetado){
  if(!planejado || planejado<=0){
    return '<div class="stage-bar-wrap"><div class="stage-bar-track"><div class="stage-bar-fill" style="width:0"></div></div><div class="stage-bar-legend"><span class="sbl-dim">Meta não definida</span></div></div>';
  }
  const pctReal = Math.min((realizado/planejado)*100, 100);
  const pctProj = Math.min((projetado/planejado)*100, 100);
  const onPace = realizado >= projetado;
  const corFill = onPace ? 'linear-gradient(90deg,#16a34a,#4ade80)' : 'linear-gradient(90deg,#b45309,#f59e0b)';
  return '<div class="stage-bar-wrap">' +
    '<div class="stage-bar-track">' +
      '<div class="stage-bar-fill" style="width:'+pctReal+'%;background:'+corFill+'"></div>' +
      '<div class="stage-bar-marker" style="left:'+pctProj+'%"></div>' +
    '</div>' +
    '<div class="stage-bar-legend">' +
      '<span>Real <b>'+NUM(realizado)+'</b></span>' +
      '<span>Pace <b>'+NUM(projetado)+'</b></span>' +
      '<span>Meta <b>'+NUM(planejado)+'</b></span>' +
    '</div></div>';
}

function listaPodioSimples_(ranking, valK, metaK){
  const ordenado = ranking.slice().sort(function(a,b){ return (b[valK]||0)-(a[valK]||0); });
  const isCr = valK === '_cr';

  if(isCr){
    const rows = ordenado.map(function(p){
      return '<tr><td><span class="pc-avatar">'+avatarConteudo_(p.nome)+'</span>'+p.nome+'</td>'+
        '<td>'+NUM(p._crDen||0)+'</td><td>'+NUM(p._crNum||0)+'</td><td class="total-col">'+PCT(p._cr)+'</td></tr>';
    }).join('');
    const denLabel = ordenado.length>0 ? (ordenado[0]._crDenLabel||'Base') : 'Base';
    const numLabel = ordenado.length>0 ? (ordenado[0]._crNumLabel||'Resultado') : 'Resultado';
    return '<table class="canal-table"><thead><tr>'+
      '<th style="text-align:left">Nome</th><th>'+denLabel+'</th><th>'+numLabel+'</th><th>Conversão</th>'+
      '</tr></thead><tbody>'+rows+'</tbody></table>';
  }

  const rows = ordenado.map(function(p){
    const val = p[valK]||0, meta = (metaK?p[metaK]:0)||0, pct = meta>0 ? val/meta : null;
    return '<tr><td><span class="pc-avatar">'+avatarConteudo_(p.nome)+'</span>'+p.nome+'</td>'+
      '<td>'+brl(meta)+'</td><td class="total-col">'+brl(val)+'</td><td>'+tt_(PCT(pct),'Realizado ÷ Meta.')+'</td></tr>';
  }).join('');
  return '<table class="canal-table"><thead><tr>'+
    '<th style="text-align:left">Nome</th><th>Meta</th><th>Realizado</th><th>% Atingimento</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table>';
}

function renderPodioTab_(closer, sdr){
  function colunaVendido(titulo, ranking){
    const top3 = (ranking||[]).slice().sort(function(a,b){ return (b.vendaFaturamento||0)-(a.vendaFaturamento||0); }).slice(0,3);
    return '<div>' +
      '<div class="pod-card pod-grande"><div class="pod-title">'+titulo+'</div>'+podium(top3, 'vendaFaturamento', 'metaVenda')+'</div>' +
      listaPodioSimples_(ranking||[], 'vendaFaturamento', 'metaVenda') +
    '</div>';
  }

  function colunaConversao(titulo, ranking, numK, denK, numLabel, denLabel){
    const comCr = (ranking||[]).map(function(p){
      const num = p[numK]||0, den = p[denK]||0;
      p._cr = den>0 ? num/den : 0;
      p._crNum = num;
      p._crDen = den;
      p._crNumLabel = numLabel;
      p._crDenLabel = denLabel;
      return p;
    });
    const top3 = comCr.slice().sort(function(a,b){ return (b._cr||0)-(a._cr||0); }).slice(0,3);
    return '<div>' +
      '<div class="pod-card pod-grande"><div class="pod-title">'+titulo+'</div>'+podium(top3, '_cr', null)+'</div>' +
      listaPodioSimples_(comCr, '_cr', null) +
    '</div>';
  }

  const vendidoHtml =
    '<div class="podios-grande-grid" style="display:grid">' +
      colunaVendido('SDR', sdr) +
      colunaVendido('Closer', closer) +
    '</div>';

  const conversaoHtml =
    '<div class="podios-grande-grid" style="display:grid">' +
      colunaConversao('SDR — CR3 (Show / Agend)', sdr, 'showRealizado', 'agendRealizado', 'Shows', 'Agend.') +
      colunaConversao('Closer — CR4 (Venda / Show)', closer, 'vendaRealizado', 'showRealizado', 'Vendas', 'Shows') +
    '</div>';

  document.getElementById('podio-main').innerHTML =
    '<div class="podio-btns">' +
      '<button class="podio-btn on" onclick="swPodio(\'vendido\',this)">Vendido</button>' +
      '<button class="podio-btn" onclick="swPodio(\'conversao\',this)">Conversão</button>' +
    '</div>' +
    '<div id="podio-vendido">'+vendidoHtml+'</div>' +
    '<div id="podio-conversao" style="display:none">'+conversaoHtml+'</div>';
}

function swPodio(view, btn){
  document.querySelectorAll('.podio-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  document.getElementById('podio-vendido').style.display = view==='vendido'?'block':'none';
  document.getElementById('podio-conversao').style.display = view==='conversao'?'block':'none';
}

      '<div class="card-sec" style="border-top-color:#f59e0b"><div class="klbl">'+tt_('Projecao de Fechamento','Cálculo: Realizado ÷ (% atingimento ÷ 100). Se você realizou '+brl(realizado)+' com '+pReal+'% da meta, projeta-se '+brl(projecao)+' até o fim do mês, mantendo o ritmo atual.')+'</div><div class="kval">'+brl(projecao)+'</div><div class="ksub">Se mantiver o ritmo atual</div></div>' +
      '<div class="card-sec proposta"><div class="klbl">'+tt_('Proposta na Rua','Negociações em aberto.')+'</div><div class="kval">'+brl(sheet.propostaNaRua)+'</div><div class="ksub">Negociacoes em aberto</div></div>' +
      '<div class="card-sec tkm"><div class="klbl">'+tt_('Ticket Medio','Faturamento ÷ Qtd vendas.')+'</div><div class="kval">'+brl(tkmReal)+'</div><div class="ksub">Planejado: '+brl(sheet.tkmPlanejado)+'</div></div>' +

  consolidado.forEach(function(l){ porEtapaConsolidado[l.Etapa] = l; });

  const stages = [
    {l:'Leads', v: funil.Leads, c:null, etapaCanal:'Leads', exp:'Negócios criados no funil SDR no período.'},

      const d = canalResumo[nome] || {vendaR:0,vendaQ:0};

    }).join('') + '</div>';

  // Top Performers
  function topList(ranking, valK, fmt, sufixo){
    const top3 = (ranking||[]).slice().sort(function(a,b){ return (b[valK]||0)-(a[valK]||0); }).slice(0,3);
    const pClasses = ['g','s','b'];
    return top3.map(function(p,i){
      return '<div style="display:flex;align-items:center;gap:10px;padding:6px 0">' +

        '<span style="flex:1;font-weight:600;color:var(--text)">'+p.nome+'</span>' +
        '<span style="font-weight:700;color:var(--accent)">'+fmt(p[valK]||0)+sufixo+'</span></div>';
    }).join('');
  }

  const topHtml =
    '<div class="sec-hdr"><span class="sec-lbl">Top Performers</span><div class="sec-line"></div></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' +

  document.getElementById('placar-main').innerHTML = hero + funilHtml + canalHtml + topHtml + renderSemanas(semanas);
  animarContadores_();

const ORDEM_ETAPAS_CANAL = ['Leads','Conexão','Agendamento','Show','Venda (Qtd)','Venda (R$)'];
// Meta Caup For (linhas 9/13/17/21 da planilha) — só Tráfego Pago e Consolidado têm meta definida;
// Base e Indicação ficam vazios na planilha, então ficam vazios aqui também.
let META_CR_POR_CANAL = {
  trafego: {}, consolidado: {}, base: {}, indicacao: {}
};

function atualizarMetaCrPorCanal_(dados){
  if(!dados) return;
  META_CR_POR_CANAL.trafego = dados.trafego || {};
  META_CR_POR_CANAL.consolidado = dados.consolidado || {};
}

function somarConsolidadoCanais_(linhas){
  const porEtapa = {};
  linhas.forEach(function(l){
    if(!porEtapa[l.Etapa]){
      porEtapa[l.Etapa] = { Canal:'Consolidado', Etapa:l.Etapa, Planejado:0, Projetado:0, RealizadoSafra:0, RealizadoMesAnterior:0, RealizadoTotal:0 };
    }
    const d = porEtapa[l.Etapa];
    d.Planejado += Number(l.Planejado)||0;
    d.Projetado += Number(l.Projetado)||0;
    d.RealizadoSafra += Number(l.RealizadoSafra)||0;
    d.RealizadoMesAnterior += Number(l.RealizadoMesAnterior)||0;
    d.RealizadoTotal += Number(l.RealizadoTotal)||0;
  });
  return ORDEM_ETAPAS_CANAL.map(function(e){ return porEtapa[e]; }).filter(Boolean);
}

function calcularCRsCanal_(mapaEtapas){
  function val(etapa, coluna){ return mapaEtapas[etapa] ? Number(mapaEtapas[etapa][coluna])||0 : 0; }
  function razao(num, den){ return den>0 ? num/den : null; }

  const leadsSafra=val('Leads','RealizadoSafra'), leadsMes=val('Leads','RealizadoMesAnterior'), leadsTotal=val('Leads','RealizadoTotal');
  const conexaoSafra=val('Conexão','RealizadoSafra'), conexaoMes=val('Conexão','RealizadoMesAnterior'), conexaoTotal=val('Conexão','RealizadoTotal');
  const agendSafra=val('Agendamento','RealizadoSafra'), agendMes=val('Agendamento','RealizadoMesAnterior'), agendTotal=val('Agendamento','RealizadoTotal');
  const showSafra=val('Show','RealizadoSafra'), showMes=val('Show','RealizadoMesAnterior'), showTotal=val('Show','RealizadoTotal');
  const vendaSafra=val('Venda (Qtd)','RealizadoSafra'), vendaMes=val('Venda (Qtd)','RealizadoMesAnterior'), vendaTotal=val('Venda (Qtd)','RealizadoTotal');

  return {
    cr1: { safra: razao(conexaoSafra,leadsSafra), mesAnterior: razao(conexaoMes,leadsMes), total: razao(conexaoTotal,leadsTotal) },
    cr2: { safra: razao(agendSafra,conexaoSafra), mesAnterior: razao(agendMes,conexaoMes), total: razao(agendTotal,conexaoTotal) },
    cr3: { safra: razao(showSafra,agendSafra), mesAnterior: razao(showMes,agendMes), total: razao(showTotal,agendTotal) },
    cr4: { safra: razao(vendaSafra,showSafra), mesAnterior: razao(vendaMes,showMes), total: razao(vendaTotal,showTotal) },
    hitRate: { safra: razao(vendaSafra,leadsSafra), mesAnterior: razao(vendaMes,leadsMes), total: razao(vendaTotal,leadsTotal) }
  };
}

function linhaCR_(label, cr, meta, explicacao){
  function crColor(valor, metaRef){
    if(valor===null || valor===undefined || metaRef===null || metaRef===undefined) return '';
    if(valor >= metaRef) return 'color:#22c55e';
    if(valor >= metaRef * 0.7) return 'color:#f59e0b';
    return 'color:#ef4444';
  }
  const labelHtml = explicacao ? tt_(label, explicacao) : label;
  const metaCell = (meta !== undefined && meta !== null) ? PCT(meta) : '—';
  const sS = crColor(cr.safra, meta);
  const mS = crColor(cr.mesAnterior, meta);
  const tS = crColor(cr.total, meta);
  return '<tr class="cr-row"><td>'+labelHtml+'</td><td class="meta-color">'+metaCell+'</td><td>—</td>' +
    '<td class="cr-value"'+(sS?' style="'+sS+'"':'')+'>'+PCT(cr.safra)+'</td>' +
    '<td class="cr-value"'+(mS?' style="'+mS+'"':'')+'>'+PCT(cr.mesAnterior)+'</td>' +
    '<td class="cr-value"'+(tS?' style="'+tS+'"':'')+'>'+PCT(cr.total)+'</td>' +
    '<td>—</td></tr>';
}

const BENCH_V4 = { cr1: 0.7233, cr2: 0.5238, cr3: 0.77, cr4: 0.2044, hitRate: 0.0624 };

function montarCardCanal_(canalNome, linhasCanal, classe){
  const mapaEtapas = {};
  linhasCanal.forEach(function(l){ mapaEtapas[l.Etapa] = l; });
  const crs = calcularCRsCanal_(mapaEtapas);
  const metaCanal = META_CR_POR_CANAL[classe] || {};
  const isConsolidado = (classe === 'consolidado');

  function crRow(label, cr, meta, exp){
    if(isConsolidado){
      const sS = crColorStyle_(cr.total, meta);
      return '<tr class="cr-row"><td>'+tt_(label, exp)+'</td><td class="meta-color">'+(meta!==null&&meta!==undefined?PCT(meta):'—')+'</td><td>—</td><td class="cr-value"'+sS+'>'+PCT(cr.total)+'</td></tr>';
    }
    return linhaCR_(label, cr, meta, exp);
  }

  let rows = '';
  ORDEM_ETAPAS_CANAL.forEach(function(etapaNome){
    const l = mapaEtapas[etapaNome];
    if(!l) return;
    const isMoney = etapaNome.indexOf('R$')>=0;
    const fmt = isMoney ? brl : NUM;

    if(isConsolidado){
      rows += '<tr><td>'+l.Etapa+'</td>'+
        '<td class="meta-color">'+(l.Planejado!==''?fmt(l.Planejado):'—')+'</td>'+
        '<td class="meta-color">'+(l.Projetado!==''?fmt(l.Projetado):'—')+'</td>'+
        '<td class="total-col">'+fmt(l.RealizadoTotal)+'</td></tr>';
    } else {
      const projetado = Number(l.Projetado)||0;
      const total = Number(l.RealizadoTotal)||0;
      const pctProjTexto = projetado>0 ? Math.round((total/projetado)*100)+'%' : '—';
      const pctProj = pctProjTexto==='—' ? '—' : tt_(pctProjTexto, 'Total realizado ÷ Projetado da planilha, para "'+l.Etapa+'".');
      rows += '<tr><td>'+l.Etapa+'</td>'+
        '<td class="meta-color">'+(l.Planejado!==''?fmt(l.Planejado):'—')+'</td>'+
        '<td class="meta-color">'+(l.Projetado!==''?fmt(l.Projetado):'—')+'</td>'+
        '<td class="safra-col">'+fmt(l.RealizadoSafra)+'</td>'+
        '<td class="mesant-col">'+fmt(l.RealizadoMesAnterior)+'</td>'+
        '<td class="total-col">'+fmt(l.RealizadoTotal)+'</td>'+
        '<td>'+pctProj+'</td></tr>';
    }

    if(etapaNome==='Conexão'){
      rows += crRow('CR1 · Conexão / Leads', crs.cr1, metaCanal.cr1, 'Conexão ÷ Leads');
      if(isTrafego) rows += '<tr style="font-size:11px;color:var(--text-dim)"><td>Bench V4 Company</td><td class="meta-color" style="font-size:11px">'+PCT(BENCH_V4.cr1)+'</td><td colspan="'+(isConsolidado?2:5)+'"></td></tr>';
    }
    if(etapaNome==='Agendamento'){
      rows += crRow('CR2 · Agendamento / Conexão', crs.cr2, metaCanal.cr2, 'Agendamento ÷ Conexão');
      if(isTrafego) rows += '<tr style="font-size:11px;color:var(--text-dim)"><td>Bench V4 Company</td><td class="meta-color" style="font-size:11px">'+PCT(BENCH_V4.cr2)+'</td><td colspan="'+(isConsolidado?2:5)+'"></td></tr>';
    }
    if(etapaNome==='Show'){
      rows += crRow('CR3 · Show / Agendamento', crs.cr3, metaCanal.cr3, 'Show ÷ Agendamento');
      if(isTrafego) rows += '<tr style="font-size:11px;color:var(--text-dim)"><td>Bench V4 Company</td><td class="meta-color" style="font-size:11px">'+PCT(BENCH_V4.cr3)+'</td><td colspan="'+(isConsolidado?2:5)+'"></td></tr>';
    }
    if(etapaNome==='Venda (Qtd)'){
      rows += crRow('CR4 · Venda / Show', crs.cr4, metaCanal.cr4, 'Venda ÷ Show');
      if(isTrafego) rows += '<tr style="font-size:11px;color:var(--text-dim)"><td>Bench V4 Company</td><td class="meta-color" style="font-size:11px">'+PCT(BENCH_V4.cr4)+'</td><td colspan="'+(isConsolidado?2:5)+'"></td></tr>';
    }
  });

  const isTrafego = (classe === 'trafego');

  const hitRateRow = isConsolidado
    ? '<tr class="cr-row hit-row"><td>'+tt_('Hit Rate · Venda / Leads','Hit Rate: Venda ÷ Leads, conversão do funil inteiro.')+'</td><td>—</td><td>—</td><td class="cr-value">'+PCT(crs.hitRate.total)+'</td></tr>'
    : '<tr class="cr-row hit-row"><td>'+tt_('Hit Rate · Venda / Leads','Hit Rate: Venda ÷ Leads, conversão do funil inteiro.')+'</td>'+(isTrafego?'<td class="meta-color">'+PCT(BENCH_V4.hitRate)+'</td>':'<td>—</td>')+'<td>—</td>' +
      '<td class="cr-value">'+PCT(crs.hitRate.safra)+'</td><td class="cr-value">'+PCT(crs.hitRate.mesAnterior)+'</td><td class="cr-value">'+PCT(crs.hitRate.total)+'</td><td>—</td></tr>';

  rows += hitRateRow;
  if(isTrafego){
    rows += '<tr style="font-size:11px;color:var(--text-dim)"><td>Bench V4 Company</td><td class="meta-color" style="font-size:11px">'+PCT(BENCH_V4.hitRate)+'</td><td colspan="5"></td></tr>';
  }

  const headerCols = isConsolidado
    ? '<th style="text-align:left">Etapa</th><th>Planejado</th><th>Projetado</th><th>Realizado</th>'
    : '<th style="text-align:left">Etapa</th><th>Planejado</th><th>Projetado</th><th>Mês Atual</th><th>Mês Ant.</th><th>Total</th><th>% Proj.</th>';

  return '<div class="canal-card '+classe+'">'+
    '<div class="canal-header '+classe+'">'+canalNome+'</div>'+
    '<table class="canal-table"><thead><tr>'+headerCols+'</tr></thead><tbody>'+rows+'</tbody></table>'+
  '</div>';
}

function crColorStyle_(valor, meta){
  if(valor===null||valor===undefined||meta===null||meta===undefined) return '';
  if(valor>=meta) return ' style="color:#22c55e"';
  if(valor>=meta*0.7) return ' style="color:#f59e0b"';
  return ' style="color:#ef4444"';
}

function construirGraficosCanais_(linhas){
  const porCanalEtapa = {};
  linhas.forEach(function(l){
    if(!porCanalEtapa[l.Canal]) porCanalEtapa[l.Canal] = {};
    porCanalEtapa[l.Canal][l.Etapa] = Number(l.RealizadoTotal)||0;
  });

  const nomesCanais = ['Tráfego Pago','Base','Indicação'];
  const classePorNomeCanal = {'Tráfego Pago':'trafego','Base':'base','Indicação':'indicacao'};
  const metrics = ['Leads','Show','Venda (Qtd)'];

  const barrasHtml = metrics.map(function(metrica){
    const valores = nomesCanais.map(function(nomeCanal){
      return (porCanalEtapa[nomeCanal] && porCanalEtapa[nomeCanal][metrica]) || 0;
    });
    const max = Math.max.apply(null, valores.concat([1]));
    const linhas2 = nomesCanais.map(function(nomeCanal, i){
      const v = valores[i];
      const pct = Math.round((v/max)*100);
      const classe = classePorNomeCanal[nomeCanal];
      return '<div class="barra-linha"><div class="barra-nome">'+nomeCanal+'</div><div class="barra-track"><div class="barra-fill '+classe+'" style="width:'+Math.max(pct,2)+'%"></div></div><div class="barra-valor-fora">'+NUM(v)+'</div></div>';
    }).join('');
    return '<div class="barra-grupo"><div class="barra-grupo-label">'+metrica+'</div>'+linhas2+'</div>';
  }).join('');

  const graficoBarras = '<div class="grafico-card"><div class="grafico-titulo">Leads · Show · Vendas por Canal</div>'+barrasHtml+'</div>';

  const valoresPizza = nomesCanais.map(function(nomeCanal){
    return (porCanalEtapa[nomeCanal] && porCanalEtapa[nomeCanal]['Venda (R$)']) || 0;
  });
  const totalPizza = valoresPizza.reduce(function(a,b){ return a+b; }, 0);
  const coresPizza = ['#22d3ee','#f59e0b','#a78bfa'];
  let acumulado = 0;
  const gradientStops = valoresPizza.map(function(v,i){
    const pctIni = totalPizza>0 ? (acumulado/totalPizza)*360 : 0;
    acumulado += v;
    const pctFim = totalPizza>0 ? (acumulado/totalPizza)*360 : 0;
    return coresPizza[i]+' '+pctIni.toFixed(1)+'deg '+pctFim.toFixed(1)+'deg';
  }).join(', ');

  const legenda = nomesCanais.map(function(nomeCanal,i){
    const v = valoresPizza[i];
    const pct = totalPizza>0 ? Math.round((v/totalPizza)*100) : 0;
    const classe = classePorNomeCanal[nomeCanal];
    return '<div class="pizza-legenda-item"><span class="pizza-dot '+classe+'"></span>'+nomeCanal+' <span class="pizza-pct">'+pct+'%</span></div>';
  }).join('');

  const pizzaHtml = totalPizza>0
    ? '<div class="pizza-wrap"><div class="pizza-svg" style="width:230px;height:230px;border-radius:50%;background:conic-gradient('+gradientStops+')"></div><div class="pizza-legenda">'+legenda+'</div></div>'
    : '<div class="zona-empty" style="padding:10px">Sem vendas no periodo ainda.</div>';

  const graficoPizza = '<div class="grafico-card"><div class="grafico-titulo">Participação no Vendido</div>'+pizzaHtml+'</div>';

  return '<div class="graficos-grid">'+graficoBarras+graficoPizza+'</div>';
}

function fmtQtdValor_(qtd, valor){
  qtd = Number(qtd)||0; valor = Number(valor)||0;
  return brl(valor) + '<div class="pc-sub">'+qtd+'x</div>';
}

function construirTabelaVendedorCanal_(linhas){
  if(!linhas || linhas.length===0) return '<div class="canal-card consolidado"><div class="canal-header consolidado">Closers</div><div class="zona-empty" style="padding:20px">Sem dados ainda.</div></div>';
  const ordenado = linhas.slice().sort(function(a,b){ return (Number(b.TotalValor)||0)-(Number(a.TotalValor)||0); });
  const rows = ordenado.map(function(l){
    return '<tr><td><span class="pc-avatar">'+avatarConteudo_(l.Nome)+'</span>'+l.Nome+'</td>'+
      '<td class="safra-col">'+fmtQtdValor_(l.TrafegoSafraQtd,l.TrafegoSafraValor)+'</td>'+
      '<td class="mesant-col">'+fmtQtdValor_(l.TrafegoMesQtd,l.TrafegoMesValor)+'</td>'+
      '<td class="safra-col">'+fmtQtdValor_(l.BaseSafraQtd,l.BaseSafraValor)+'</td>'+
      '<td class="mesant-col">'+fmtQtdValor_(l.BaseMesQtd,l.BaseMesValor)+'</td>'+
      '<td class="safra-col">'+fmtQtdValor_(l.IndicacaoSafraQtd,l.IndicacaoSafraValor)+'</td>'+
      '<td class="mesant-col">'+fmtQtdValor_(l.IndicacaoMesQtd,l.IndicacaoMesValor)+'</td>'+
      '<td class="total-col">'+brl(l.TotalValor)+'<div class="pc-sub">'+NUM(l.TotalQtd)+' venda(s)</div></td></tr>';
  }).join('');
  return '<div class="canal-card consolidado"><div class="canal-header consolidado">Closers</div>' +
    '<table class="canal-table"><thead>'+
    '<tr><th style="text-align:left">Closer</th><th colspan="2">Tráfego Pago</th><th colspan="2">Base</th><th colspan="2">Indicação</th><th>Total</th></tr>'+
    '<tr><th></th><th>Mês Atual</th><th>Mês Ant.</th><th>Mês Atual</th><th>Mês Ant.</th><th>Mês Atual</th><th>Mês Ant.</th><th></th></tr>'+
    '</thead><tbody>'+rows+'</tbody></table></div>';
}

function construirTabelaUnificada_(titulo, linhas, etapas){
  if(!linhas || linhas.length===0) return '<div class="zona-empty" style="padding:20px">Sem dados ainda.</div>';

  const canais = ['trafego','base','indicacao'];
  const nomesCanal = { trafego:'Tráfego Pago', base:'Base', indicacao:'Indicação' };
  const ordenado = linhas.slice().sort(function(a,b){ return (a.Nome||'').localeCompare(b.Nome||'', 'pt-BR'); });

  // Guarda dados globais pra o JS de expansão acessar
  window._perfData = window._perfData || {};
  window._perfData[titulo] = { linhas: ordenado, etapas: etapas };

  function celVal(l, etapa, canal){
    const c = etapa.campos[canal];
    if(etapa.tipo==='cr'){
      const nA = Number(l[c.numAtual])||0, nB = Number(l[c.numAnt])||0;
      const dA = Number(l[c.denAtual])||0, dB = Number(l[c.denAnt])||0;
      return { atual: dA>0?nA/dA:null, ant: dB>0?nB/dB:null, somaNum:nA+nB, somaDen:dA+dB };
    }
    if(etapa.tipo==='tkm'){
      const vA = Number(l[c.valAtual])||0, vB = Number(l[c.valAnt])||0;
      const qA = Number(l[c.qtdAtual])||0, qB = Number(l[c.qtdAnt])||0;
      return { atual: qA>0?vA/qA:null, ant: qB>0?vB/qB:null, somaVal:vA+vB, somaQtd:qA+qB };
    }
    const atual = Number(l[c.atual])||0, ant = Number(l[c.ant])||0;
    return { atual: atual, ant: ant, soma: atual+ant };
  }

  const colHeaders = etapas.map(function(e){ return '<th style="text-align:center">'+e.label+'</th>'; }).join('');

  const corpoHtml = ordenado.map(function(l, ri){
    const cells = etapas.map(function(etapa, ci){
      const isCr = etapa.tipo==='cr';
      const isTkm = etapa.tipo==='tkm';
      const fmt = (etapa.isMoney || isTkm) ? brl : NUM;
      let consNum=0, consDen=0, consSoma=0, consVal=0, consQtd=0;
      canais.forEach(function(canal){
        const c = celVal(l, etapa, canal);
        if(isCr){ consNum+=c.somaNum; consDen+=c.somaDen; }
        else if(isTkm){ consVal+=c.somaVal; consQtd+=c.somaQtd; }
        else { consSoma+=c.soma; }
      });
      let consolidado;
      if(isCr) consolidado = consDen>0 ? PCT(consNum/consDen) : '—';
      else if(isTkm) consolidado = consQtd>0 ? brl(consVal/consQtd) : '—';
      else consolidado = fmt(consSoma);
      const crStyle = isCr ? ' style="color:var(--accent);cursor:pointer"' : ' style="cursor:pointer"';
      return '<td class="perf-cell" onclick="togglePerfDetail(\''+titulo+'\','+ri+','+ci+')"'+crStyle+'>'+consolidado+'</td>';
    }).join('');

    return '<tr><td style="vertical-align:top"><span class="pc-avatar">'+avatarConteudo_(l.Nome)+'</span>'+l.Nome+'</td>'+cells+'</tr>' +
      '<tr id="perf-det-'+titulo.replace(/\s/g,'')+'-'+ri+'" style="display:none"><td colspan="'+(etapas.length+1)+'" style="padding:0"><div class="perf-detail-box"></div></td></tr>';
  }).join('');

  return '<table class="canal-table perf-table"><thead><tr><th style="text-align:left">Nome</th>'+colHeaders+'</tr></thead><tbody>'+corpoHtml+'</tbody></table>';
}

window._perfOpen = null;

function togglePerfDetail(titulo, ri, ci){
  var key = titulo.replace(/\s/g,'');
  var detailRow = document.getElementById('perf-det-'+key+'-'+ri);
  var box = detailRow.querySelector('.perf-detail-box');
  var cellKey = key+'-'+ri+'-'+ci;

  if(window._perfOpen === cellKey){
    detailRow.style.display = 'none';
    window._perfOpen = null;
    return;
  }

  // Fechar o anterior se for da mesma pessoa
  if(window._perfOpen && window._perfOpen.indexOf(key+'-'+ri+'-')===0){
    // mesmo ri, coluna diferente — só troca conteúdo
  } else {
    // fechar qualquer outro aberto
    document.querySelectorAll('[id^="perf-det-'+key+'"]').forEach(function(el){ el.style.display='none'; });
  }

  var data = window._perfData[titulo];
  var l = data.linhas[ri];
  var etapa = data.etapas[ci];
  var isCr = etapa.tipo==='cr';
  var isTkm = etapa.tipo==='tkm';
  var fmt = (etapa.isMoney || isTkm) ? brl : NUM;
  var canais = ['trafego','base','indicacao'];
  var nomesCanal = { trafego:'Tráfego Pago', base:'Base', indicacao:'Indicação' };

  var h = '<table style="width:100%;border-collapse:collapse;font-size:12px">' +
    '<tr><td style="padding:6px 8px;font-weight:500;color:var(--text-sec)">Canal</td><td style="padding:6px 8px;text-align:center;font-weight:500">Mês Atual</td><td style="padding:6px 8px;text-align:center;font-weight:500">Mês Ant.</td></tr>';

  canais.forEach(function(canal){
    var c = etapa.campos[canal];
    var atVal, anVal;
    if(isCr){
      var nA = Number(l[c.numAtual])||0, nB = Number(l[c.numAnt])||0;
      var dA = Number(l[c.denAtual])||0, dB = Number(l[c.denAnt])||0;
      atVal = dA>0 ? PCT(nA/dA) : '—';
      anVal = dB>0 ? PCT(nB/dB) : '—';
    } else if(isTkm){
      var vA = Number(l[c.valAtual])||0, vB = Number(l[c.valAnt])||0;
      var qA = Number(l[c.qtdAtual])||0, qB = Number(l[c.qtdAnt])||0;
      atVal = qA>0 ? brl(vA/qA) : '—';
      anVal = qB>0 ? brl(vB/qB) : '—';
    } else {
      atVal = fmt(Number(l[c.atual])||0);
      anVal = c.ant ? fmt(Number(l[c.ant])||0) : '—';
    }
    h += '<tr><td style="padding:6px 8px;font-weight:500">'+nomesCanal[canal]+'</td>' +
      '<td style="padding:6px 8px;text-align:center">'+atVal+'</td>' +
      '<td style="padding:6px 8px;text-align:center">'+anVal+'</td></tr>';
  });

  h += '</table>';
  box.innerHTML = h;
  detailRow.style.display = 'table-row';
  window._perfOpen = cellKey;
}

function renderCanais(linhas, metaCr){
  atualizarMetaCrPorCanal_(metaCr);
  const elFunil = document.getElementById('canais-funil');
  if(!linhas || linhas.length===0){
    elFunil.innerHTML = '<div class="zona-empty" style="padding:20px">Sem dados de canais ainda.</div>';
    return;
  }

  const porCanal = {};
  linhas.forEach(function(l){
    if(!porCanal[l.Canal]) porCanal[l.Canal] = [];
    porCanal[l.Canal].push(l);
  });

  const classePorCanal = { 'Tráfego Pago':'trafego', 'Base':'base', 'Indicação':'indicacao', 'Consolidado':'consolidado' };
  const consolidado = somarConsolidadoCanais_(linhas);
  const ordemCanais = ['Consolidado', 'Tráfego Pago', 'Base', 'Indicação'];

  const paineis = ordemCanais.map(function(canalNome){
    const linhasCanal = canalNome==='Consolidado' ? consolidado : porCanal[canalNome];
    if(!linhasCanal || linhasCanal.length===0) return '<div class="canal-painel" data-canal="'+classePorCanal[canalNome]+'"></div>';
    const tabelaHtml = montarCardCanal_(canalNome, linhasCanal, classePorCanal[canalNome]);
    return '<div class="canal-painel" data-canal="'+classePorCanal[canalNome]+'" style="display:none">'+tabelaHtml+'</div>';
  }).join('');

  const botoes = ordemCanais.map(function(canalNome, idx){
    const cls = classePorCanal[canalNome];
    return '<button class="canal-btn'+(idx===0?' on':'')+'" data-canal="'+cls+'" onclick="swCanal(\''+cls+'\',this)">'+canalNome+'</button>';
  }).join('');

  elFunil.innerHTML =
    '<div class="sec-hdr"><span class="sec-lbl">Performance por Canal</span><div class="sec-line"></div></div>' +
    '<div class="canal-btns">'+botoes+'</div>' +
    '<div id="canal-paineis">'+paineis+'</div>';

  // Mostra o primeiro canal (Consolidado) por padrão
  var painelInicial = document.querySelector('.canal-painel[data-canal="consolidado"]');
  if(painelInicial) painelInicial.style.display = 'block';
}

function swCanal(canal, btn){
  document.querySelectorAll('.canal-btn').forEach(function(b){ b.classList.remove('on'); });
  document.querySelectorAll('.canal-painel').forEach(function(p){ p.style.display = 'none'; });
  btn.classList.add('on');
  var painel = document.querySelector('.canal-painel[data-canal="'+canal+'"]');
  if(painel) painel.style.display = 'block';
}

// ===== PODIO =====
function podium(top3, valK, metaK){
  const ord=[{i:1,cls:'s'},{i:0,cls:'f'},{i:2,cls:'t'}];
  const bases=['2º','1º','3º'];
  const isCr = valK === '_cr';
  return '<div class="podium">'+ord.map(function(o){
    const p=top3[o.i];
    if(!p) return '<div class="ps '+o.cls+'"></div>';
    const val=p[valK]||0, meta=(metaK?p[metaK]:0)||0, pct=meta>0?val/meta:null;
    const nome=p.nome.split(' ').slice(0,2).join('<br>');
    const lbl = isCr ? PCT(val) : (valK.indexOf('Faturamento')>=0 ? brl(val) : NUM(val));
    const pctLbl = isCr ? '' : '<div class="pct-lbl">'+tt_(PCT(pct),'Realizado ÷ Meta.')+'</div>';
    return '<div class="ps '+o.cls+'"><div class="av">'+avatarConteudo_(p.nome)+'</div><div class="pn">'+nome+'</div><div class="pv">'+lbl+'</div>'+pctLbl+'<div class="pb">'+bases[ord.indexOf(o)]+'</div></div>';
  }).join('')+'</div>';
}

// ===== ZONAS (Meta) =====
function zonasMeta(ranking, valK, metaK){
  const withMeta = ranking.filter(function(p){ return (p[metaK]||0) > 0; });
  const super_ = withMeta.filter(function(p){ return p[valK]/p[metaK] >= 1.3; });
  const ok = withMeta.filter(function(p){ const r=p[valK]/p[metaK]; return r>=1.0 && r<1.3; });
  function chip(p){
    const val=p[valK]||0, meta=p[metaK]||1;
    const lbl = valK.indexOf('Faturamento')>=0 ? brl(val) : NUM(val);
    return '<div class="zona-chip"><div class="zona-av">'+avatarConteudo_(p.nome)+'</div><div class="zona-info"><div class="zona-nome">'+p.nome.split(' ').slice(0,2).join(' ')+'</div><div class="zona-val">'+lbl+' · '+tt_(PCT(val/meta),'Realizado ÷ Meta.')+'</div></div></div>';
  }
  return '<div class="zona-card"><div class="zona-header"><span class="zona-badge">Super Meta >=130%</span><span class="zona-sub">'+super_.length+'</span></div><div class="zona-pessoas">'+(super_.length?super_.map(chip).join(''):'<div class="zona-empty">Nenhum ainda</div>')+'</div></div>'+
    '<div class="zona-card"><div class="zona-header"><span class="zona-badge">Meta 100-129%</span><span class="zona-sub">'+ok.length+'</span></div><div class="zona-pessoas">'+(ok.length?ok.map(chip).join(''):'<div class="zona-empty">Nenhum ainda</div>')+'</div></div>';
}

// ===== TABELA =====
function tabela(ranking, valK, metaK, paceK){
  const ordenado = ranking.slice().sort(function(a,b){ return (b[valK]||0)-(a[valK]||0); });
  const isMoney = valK.indexOf('Faturamento')>=0;
  const fmt = isMoney ? brl : NUM;
  const rows = ordenado.map(function(p,i){
    const meta=p[metaK]||0, pace=p[paceK]>1?p[paceK]:null, real=p[valK]||0;
    const gap = pace!==null ? real-pace : null;
    const ok = pace!==null ? real>=pace : null;
    return '<tr><td><span class="rp">'+(i+1)+'</span>'+p.nome.split(' ').slice(0,2).join(' ')+'</td>'+
      '<td class="meta-color">'+fmt(meta)+'</td>'+
      '<td class="meta-color">'+(pace!==null?fmt(pace):'—')+'</td>'+
      '<td style="font-weight:700;color:'+(ok===null?'#fff':ok?'#4ade80':'#f87171')+'">'+fmt(real)+'</td>'+
      '<td style="color:'+(ok===null?'var(--text-dim)':ok?'#4ade80':'#f87171')+'">'+(gap!==null?(gap>=0?'+':'')+fmt(gap):'—')+'</td>'+
      '<td><span class="pill '+(ok===null?'a':ok?'g':'r')+'">'+(ok===null?'—':ok?'No pace':'Abaixo')+'</span></td></tr>';
  }).join('');
  return '<table><thead><tr><th style="text-align:left">Nome</th>'+
    '<th>'+tt_('Meta','Meta definida na aba Metas_Ranking_Fortaleza da sua planilha.')+'</th>'+
    '<th>'+tt_('Pace','Meta × dias úteis passados ÷ dias úteis do mês (calculado automaticamente).')+'</th>'+
    '<th>'+tt_('Realizado','Contagem/soma via Ploomes no período selecionado.')+'</th>'+
    '<th>'+tt_('GAP Pace','Realizado − Pace.')+'</th>'+
    '<th>'+tt_('Status','"No pace" se Realizado ≥ Pace; "Abaixo" caso contrário.')+'</th>'+
    '</tr></thead><tbody>'+
    (rows || '<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:20px">Sem dados no periodo</td></tr>') +
    '</tbody></table>';
}

// ===== SEM PODIO — usado em Agendamento e Show (o que importa e' o pace, nao o ranking em si) =====
function zonasPace_(ranking, valK, paceK){
  const noPace = [], foraPace = [], semPace = [];
  ranking.forEach(function(p){
    const pace = p[paceK] > 1 ? p[paceK] : null;
    if(pace === null){
      semPace.push(p);
    } else if((p[valK]||0) >= pace){
      noPace.push(p);
    } else {
      foraPace.push(p);
    }
  });
  return { noPace: noPace, foraPace: foraPace, semPace: semPace };
}

    return '<div class="zona-chip"><div class="zona-av">'+avatarConteudo_(p.nome)+'</div><div class="zona-info"><div class="zona-nome">'+p.nome.split(' ').slice(0,2).join(' ')+'</div><div class="zona-val">'+lbl+'</div></div></div>';

function renderKpis(elId, ranking, valK, metaK, paceK){
  const totalMeta = ranking.reduce(function(s,p){ return s+(p[metaK]||0); }, 0);

  const totalReal = ranking.reduce(function(s,p){ return s+(p[valK]||0); }, 0);
  const gap = totalReal - totalPace;
  const isMoney = valK.indexOf('Faturamento')>=0;
  const formato = isMoney ? 'money' : 'number';
  document.getElementById(elId).innerHTML =
    '<div class="kpi"><div class="kpi-l">'+tt_('Meta','Soma da Meta de todo o time (aba Metas_Ranking_Fortaleza).')+'</div><div class="kpi-v meta-color">'+cu_(totalMeta,formato)+'</div></div>'+

}

function construirTabelaEtapaCloser_(titulo, linhas, campos, isMoney){
  if(!linhas || linhas.length===0) return '';
  const ordenado = linhas.slice().sort(function(a,b){
    function total(l){ return (Number(l[campos.trafegoAtual])||0)+(Number(l[campos.trafegoAnt])||0)+(Number(l[campos.baseAtual])||0)+(Number(l[campos.baseAnt])||0)+(Number(l[campos.indAtual])||0)+(Number(l[campos.indAnt])||0); }
    return total(b) - total(a);
  });
  const fmt = isMoney ? brl : NUM;
  const rows = ordenado.map(function(l){
    const trafegoAtual = Number(l[campos.trafegoAtual])||0, trafegoAnt = Number(l[campos.trafegoAnt])||0;
    const baseAtual = Number(l[campos.baseAtual])||0, baseAnt = Number(l[campos.baseAnt])||0;
    const indAtual = Number(l[campos.indAtual])||0, indAnt = Number(l[campos.indAnt])||0;
    const total = trafegoAtual+trafegoAnt+baseAtual+baseAnt+indAtual+indAnt;
    return '<tr><td><span class="pc-avatar">'+avatarConteudo_(l.Nome)+'</span>'+l.Nome+'</td>'+
      '<td class="safra-col">'+fmt(trafegoAtual)+'</td><td class="mesant-col">'+fmt(trafegoAnt)+'</td>'+
      '<td class="safra-col">'+fmt(baseAtual)+'</td><td class="mesant-col">'+fmt(baseAnt)+'</td>'+
      '<td class="safra-col">'+fmt(indAtual)+'</td><td class="mesant-col">'+fmt(indAnt)+'</td>'+
      '<td class="total-col">'+fmt(total)+'</td></tr>';
  }).join('');
  return '<div class="canal-card"><div class="canal-header consolidado">'+titulo+'</div>' +
    '<table class="canal-table"><thead>'+
    '<tr><th style="text-align:left">Closer</th><th colspan="2">Tráfego Pago</th><th colspan="2">Base</th><th colspan="2">Indicação</th><th>Total</th></tr>'+
    '<tr><th></th><th>Mês Atual</th><th>Mês Ant.</th><th>Mês Atual</th><th>Mês Ant.</th><th>Mês Atual</th><th>Mês Ant.</th><th></th></tr>'+
    '</thead><tbody>'+rows+'</tbody></table></div>';
}

// ===== NAVEGACAO =====
function swMain(name, btn){
  document.querySelectorAll('.main-tab').forEach(function(t){ t.classList.remove('on'); });
  document.querySelectorAll('.main-panel').forEach(function(p){ p.classList.remove('on'); });
  btn.classList.add('on');
  document.getElementById('panel-'+name).classList.add('on');
}
function swSub(group, name, btn){
  document.querySelectorAll('#panel-'+group+' .subtab').forEach(function(t){ t.classList.remove('on'); });
  document.querySelectorAll('#panel-'+group+' .subpanel').forEach(function(p){ p.classList.remove('on'); });
  btn.classList.add('on');
  document.getElementById(group+'-'+name).classList.add('on');
}

// ===== FETCH =====
const CACHE_TTL = 5*60*1000;
function cacheGet(key){
  try{
    const raw=localStorage.getItem(key);
    if(!raw) return null;
    const obj=JSON.parse(raw);
    if(Date.now()-obj.ts>CACHE_TTL*4) return null;
    return obj.data;
  }catch(e){ return null; }
}
function cacheSet(key,data){
  try{ localStorage.setItem(key, JSON.stringify({ts:Date.now(),data:data})); }catch(e){}
}
async function fetchJSON(url){
  const res = await fetch(url, {cache:'no-store'});
  return res.json();
}

async function loadAll(useCache){
  const btnAtualizar = document.getElementById('btnAtualizar');
  if(btnAtualizar){ btnAtualizar.textContent = 'Atualizando...'; btnAtualizar.disabled = true; btnAtualizar.style.opacity = '0.6'; }

  const cachedCloser = useCache ? cacheGet('rk_closer') : null;
  const cachedSdr = useCache ? cacheGet('rk_sdr') : null;
  const cachedFunil = useCache ? cacheGet('rk_funil') : null;
  const cachedSheet = useCache ? cacheGet('rk_sheet') : null;
  const cachedCanais = useCache ? cacheGet('rk_canais') : null;
  const cachedMetaCr = useCache ? cacheGet('rk_metacr') : null;
  const cachedSemanas = useCache ? cacheGet('rk_semanas') : null;
  const cachedCloserCanal = useCache ? cacheGet('rk_closer_canal') : null;
  const cachedPessoaSdr = useCache ? cacheGet('rk_pessoa_sdr') : null;
  const cachedLigacoes = useCache ? cacheGet('rk_ligacoes') : null;
  if(cachedCloser) renderCloser(cachedCloser);
  if(cachedSdr) renderSdr(cachedSdr);
  if(cachedCloser || cachedSdr) renderPodioTab_(cachedCloser || [], cachedSdr || []);
  if(cachedLigacoes) renderLigacoes(cachedLigacoes);
  if(cachedFunil && cachedSheet) renderPlacar(cachedSheet, cachedFunil, cachedSemanas || [], cachedCanais || [], cachedCloser || [], cachedSdr || []);
  if(cachedCanais) renderCanais(cachedCanais, cachedMetaCr);
  if(cachedCloserCanal) renderCloserPorCanal(cachedCloserCanal, cachedCloser);
  if(cachedPessoaSdr) renderSdrPorCanal(cachedPessoaSdr, cachedSdr);

  try{
    const q = periodoQuery_();
    const closer = await fetchJSON(BASE_URL + '?tipo=ranking_closer' + q);
    const sdr = await fetchJSON(BASE_URL + '?tipo=ranking_sdr' + q);
    const funil = await fetchJSON(BASE_URL + '?tipo=funil' + q);
    const sheet = await fetchPlacarMeta();
    const canais = await fetchJSON(BASE_URL + '?tipo=canais' + q);
    const metaCr = await fetchJSON(BASE_URL + '?tipo=metacr' + q);
    const semanas = await fetchJSON(BASE_URL + '?tipo=semanas' + q);
    const closerCanal = await fetchJSON(BASE_URL + '?tipo=closerfunilcanal' + q);
    const pessoaSdr = await fetchJSON(BASE_URL + '?tipo=pessoacanal_sdr' + q);
    const ligacoes = await fetchJSON(BASE_URL + '?tipo=ligacoes' + q);
    renderCloser(closer);
    renderSdr(sdr);
    renderPodioTab_(closer, sdr);
    renderLigacoes(ligacoes);
    renderPlacar(sheet, funil, semanas, canais, closer, sdr);
    renderCanais(canais, metaCr);
    renderCloserPorCanal(closerCanal, closer);
    renderSdrPorCanal(pessoaSdr, sdr);
    cacheSet('rk_closer', closer);
    cacheSet('rk_sdr', sdr);
    cacheSet('rk_funil', funil);
    cacheSet('rk_sheet', sheet);
    cacheSet('rk_canais', canais);
    cacheSet('rk_metacr', metaCr);
    cacheSet('rk_semanas', semanas);
    cacheSet('rk_closer_canal', closerCanal);
    cacheSet('rk_pessoa_sdr', pessoaSdr);
    cacheSet('rk_ligacoes', ligacoes);
    document.getElementById('ts').textContent = 'Atualizado as ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    console.error(e);
    document.getElementById('ts').textContent = 'Erro ao atualizar (mostrando cache)';
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  if(btnAtualizar){ btnAtualizar.textContent = 'Atualizar'; btnAtualizar.disabled = false; btnAtualizar.style.opacity = '1'; }
}

function toggleTema(){
  const atual = document.documentElement.getAttribute('data-theme');
  const novo = atual === 'light' ? '' : 'light';
  if(novo) document.documentElement.setAttribute('data-theme','light');
  else document.documentElement.removeAttribute('data-theme');
  document.getElementById('btnTema').textContent = novo ? 'Dark' : 'Light';
  try{ localStorage.setItem('tema', novo || 'dark'); }catch(e){}
}

function aplicarTemaInicial_(){
  try{
    const salvo = localStorage.getItem('tema');
    if(salvo === 'light'){
      document.documentElement.setAttribute('data-theme','light');
      var btn = document.getElementById('btnTema');
      if(btn) btn.textContent = 'Dark';
    }
    // Dark é o padrão — sem salvo ou 'dark', fica escuro
  }catch(e){}
}

initTooltips_();
aplicarTemaInicial_();
atualizarLabelPeriodo();
loadAll(true);
setInterval(function(){ loadAll(false); }, 5*60*1000);

</script>
